<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ '/' | relative_url }}"><span class="brandText">AI for QA</span></a>
    <nav class="nav" aria-label="Primary">
      <a href="{{ '/#articles' | relative_url }}">Articles</a>
      <a href="{{ '/about.html' | relative_url }}">About</a>
    </nav>
  </header>
  <main class="post-content">
    <article>
      <header>
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      </header>
      {{ content }}
    </article>
    <p><a href="{{ '/' | relative_url }}">&larr; Back to Home</a></p>
  </main>
  <footer class="footer">
    <div class="footInner">
      <div class="footNote">Educational content only. Not regulatory or legal advice.</div>
    </div>
  </footer>
</body>
</html>
